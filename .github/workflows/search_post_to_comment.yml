name: Search Post to Comment

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  search-automation:
    runs-on: ubuntu-latest
    
    # CRITICAL: Permission granted for committing/pushing changes back to repo
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 # Full history fetch karega safe dynamic push ke liye

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Pull Latest Changes (Maintain Persistence)
      run: |
        git pull origin ${GITHUB_REF_NAME} --rebase

    - name: Install and Connect OpenVPN (Randomized Config Loader)
      env:
        VPN_USER: ${{ secrets.VPN_USERNAME }}
        VPN_PASS: ${{ secrets.VPN_PASSWORD }}
      run: |
        set +e
        export DEBIAN_FRONTEND=noninteractive
        
        # Ubuntu ke triggers block karna taaki apt installation fast ho
        sudo dpkg-divert --local --rename --add /usr/sbin/policy-rc.d
        echo "exit 101" | sudo tee /usr/sbin/policy-rc.d
        sudo chmod +x /usr/sbin/policy-rc.d
        
        sudo apt-get remove --purge -y needrestart
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends openvpn
        
        sudo rm -f /usr/sbin/policy-rc.d || true
        
        # 🎲 RANDOM FILE SELECTION MECHANISM
        FILES=(ovpn/ovpn_*.txt)
        
        if [ ${#FILES[@]} -eq 0 ]; then
          echo "[ERROR] No OVPN text files found in 'ovpn/' directory!"
          exit 1
        fi
        
        RANDOM_INDEX=$(( RANDOM % ${#FILES[@]} ))
        SELECTED_FILE=${FILES[$RANDOM_INDEX]}
        echo "[INFO] Randomly selected VPN Config: $SELECTED_FILE"
        
        cat "$SELECTED_FILE" > client.ovpn
        echo -e "$VPN_USER\n$VPN_PASS" > credentials.txt
        chmod 600 credentials.txt
        
        # 💡 CLEANUP CONFIG TO PREVENT HANGS
        sed -i '/update-resolv-conf/d' client.ovpn
        sed -i 's/resolv-retry infinite/resolv-retry 2/g' client.ovpn
        sed -i 's/auth-user-pass.*/auth-user-pass credentials.txt/g' client.ovpn
        
        echo "[INFO] Starting OpenVPN in background daemon mode..."
        sudo openvpn --config client.ovpn --log openvpn.log --daemon
        
        set -e
        
        echo "[WAIT] Waiting 20 seconds for VPN tunnel..."
        sleep 20
        
        echo "--- OpenVPN Init Logs ---"
        sudo tail -n 15 openvpn.log || true
        
        echo "[INFO] Checking Public IP Status..."
        if curl -s --max-time 10 https://ifconfig.me; then
          echo -e "\n[SUCCESS] VPN Connected Successfully!"
        else
          echo -e "\n[WARNING] First choice failed or timed out. Trying a different random config as fallback..."
          NEW_INDEX=$(( (RANDOM_INDEX + 1) % ${#FILES[@]} ))
          SELECTED_FILE=${FILES[$NEW_INDEX]}
          echo "[INFO] Fallback selected VPN Config: $SELECTED_FILE"
          
          sudo killall openvpn || true
          cat "$SELECTED_FILE" > client.ovpn
          sed -i '/update-resolv-conf/d' client.ovpn
          sed -i 's/resolv-retry infinite/resolv-retry 2/g' client.ovpn
          sed -i 's/auth-user-pass.*/auth-user-pass credentials.txt/g' client.ovpn
          
          sudo openvpn --config client.ovpn --log openvpn.log --daemon
          sleep 20
          sudo tail -n 15 openvpn.log || true
          curl -s --max-time 10 https://ifconfig.me || echo "Proceeding with current network route..."
        fi

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright playwright-stealth cryptography python-dotenv
        playwright install chromium --with-deps

    - name: Run Search Script
      env:
        DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }} # Ensure this is added in GitHub Secrets
      run: |
        python search_post_to_comment.py

    # =======================================================
    # NEW: ARCHIVE ERROR SCREENSHOTS IF SCRIPT FAILS
    # =======================================================
    - name: Upload Error Screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-screenshots
        path: "*.png"
        if-no-files-found: ignore
        retention-days: 3

    # =======================================================
    # UPDATED: COMMIT AND PUSH STATUS & COMMENTED STATE
    # =======================================================
    - name: Commit and Push Status Changes
      if: always() # Hamesha run hoga persistence ke liye
      run: |
        # Dono files ko safety check ke saath stage karega
        [ -f status.json ] && git add status.json
        [ -f commented.json ] && git add commented.json
        
        if git diff --staged --quiet; then
          echo "[INFO] No changes detected in status or commented JSONs. Skipping push."
        else
          echo "[OK] Changes detected. Committing dynamic state..."
          git commit -m "Automated: Fresh target state updated [skip ci]"
          git push origin ${GITHUB_REF_NAME}
        fi

    - name: Cleanup Credentials
      if: always()
      run: |
        rm -f credentials.txt client.ovpn openvpn.log || true