name: 1A. Search Post to Comment

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  search-automation:
    runs-on: ubuntu-latest
    
    # CRITICAL: Permission granted for committing/pushing changes back to repo
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 # Full history fetch karega safe dynamic push ke liye

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Pull Latest Changes (Maintain Persistence)
      run: |
        git pull origin ${GITHUB_REF_NAME} --rebase

    - name: Install and Start Cloudflare WARP (TUN Global Mode)
      run: |
        # 1. Repository aur GPG Key set karein
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        
        # 2. Install
        sudo apt-get update && sudo apt-get install -y cloudflare-warp
        
        # 3. Start Service
        sudo systemctl start warp-svc
        sleep 2
        
        # 4. Register (New CLI Syntax compatible)
        warp-cli --accept-tos registration new || warp-cli registration new
        
        # 5. STRICT FIX: Mode ko PROXY se badal kar TUN (Standard VPN) karein
        # Yeh pure GitHub runner ka internet traffic WARP se routing kar dega
        warp-cli --accept-tos mode warp || warp-cli mode warp
        
        # 6. Connect
        warp-cli --accept-tos connect || warp-cli connect
        sleep 5
        
        # 7. Verify ki pure system ka IP change hua ya nahi
        curl https://cloudflare.com/cdn-cgi/trace

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright playwright-stealth cryptography python-dotenv requests
        playwright install chromium --with-deps

    - name: Run Search Script
      env:
        DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
        IMGBBB_API_KEY: ${{ secrets.IMGBBB_API_KEY }}
      run: |
        python search_post_to_comment.py

    # =======================================================
    # NEW: ARCHIVE ERROR SCREENSHOTS IF SCRIPT FAILS
    # =======================================================
    - name: Upload Error Screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-screenshots
        path: "*.png"
        if-no-files-found: ignore
        retention-days: 3

    # =======================================================
    # UPDATED: COMMIT AND PUSH STATUS & COMMENTED STATE
    # =======================================================
    - name: Commit and Push Status Changes
      if: always() # Hamesha run hoga persistence ke liye
      run: |
        # Dono files ko safety check ke saath stage karega
        [ -f status.json ] && git add status.json
        [ -f commented.json ] && git add commented.json
        
        if git diff --staged --quiet; then
          echo "[INFO] No changes detected in status or commented JSONs. Skipping push."
        else
          echo "[OK] Changes detected. Committing dynamic state..."
          git commit -m "Automated: Fresh target state updated [skip ci]"
          git pull origin ${GITHUB_REF_NAME} --rebase
          git push origin ${GITHUB_REF_NAME}
        fi

    - name: Cleanup Credentials
      if: always()
      run: |
        rm -f credentials.txt client.ovpn openvpn.log || true