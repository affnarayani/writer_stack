name: 2A. Generate Content

on:
  schedule:
    # Example: Har roz raat ko 12 baje chalane ke liye (Aap apne hisab se cron change kar sakte hain)
    - cron: '0 14 * * *'
  workflow_dispatch: # Taaki aap GitHub UI se manually bhi run kar sakein

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 # Full history fetch karega taaki safe dynamic push ho sake

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11' # Aapki library requirements ke liye optimal hai

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Pull Latest Changes (Maintain Persistence)
      run: |
        git pull origin ${GITHUB_REF_NAME} --rebase

    - name: Install and Start Cloudflare WARP (TUN Global Mode)
      run: |
        # 1. Repository aur GPG Key set karein
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        
        # 2. Install
        sudo apt-get update && sudo apt-get install -y cloudflare-warp
        
        # 3. Start Service
        sudo systemctl start warp-svc
        sleep 2
        
        # 4. Register (New CLI Syntax compatible)
        warp-cli --accept-tos registration new || warp-cli registration new
        
        # 5. STRICT FIX: Mode ko PROXY se badal kar TUN (Standard VPN) karein
        # Yeh pure GitHub runner ka internet traffic WARP se routing kar dega
        warp-cli --accept-tos mode warp || warp-cli mode warp
        
        # 6. Connect
        warp-cli --accept-tos connect || warp-cli connect
        sleep 5
        
        # 7. Verify ki pure system ka IP change hua ya nahi
        curl https://cloudflare.com/cdn-cgi/trace

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright playwright-stealth cryptography python-dotenv
        playwright install chromium --with-deps

    - name: Run Script
      env:
        DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
      run: |
        python generate_content.py

    - name: Upload Error Screenshot
      if: failure() # Yeh step sirf tabhi chalega jab upar wala step fail hoga
      uses: actions/upload-artifact@v4
      with:
        name: playright-error-screenshot
        path: error_screenshot.png
        if-no-files-found: ignore

    - name: Commit and Push Changes (If updated)
      run: |
        # Check karega ki article.json ya topics.txt mein koi change hua hai ya nahi
        git add article.json topics.txt
        
        if git diff --staged --quiet; then
          echo "[INFO] No changes detected (Content might have been already posted or execution skipped). Skipping push."
        else
          echo "[OK] Changes detected. Committing and pushing updates..."
          git commit -m "Automated: Update article and topics list [skip ci]"
          git pull origin ${GITHUB_REF_NAME} --rebase
          git push origin ${GITHUB_REF_NAME}
        fi