name: Run India Medium Automation

on:
  workflow_dispatch: # Only manual trigger enabled

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip net-tools curl

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install playwright playwright-stealth cryptography python-dotenv

      - name: Install Playwright Browsers & System Deps
        run: |
          playwright install chromium --with-deps

      - name: Install, Start and Verify Tor
        run: |
          sudo apt-get install -y tor
          sudo systemctl start tor
          echo "[TOR] Waiting for Tor to be ready on port 9050..."
          # Retry loop to ensure Tor is fully listening
          for i in {1..20}; do
            if netstat -lnt | grep -q :9050; then
              echo "[TOR] Connection established successfully!"
              break
            fi
            sleep 5
          done
          # Final check to verify internet routing via Tor
          echo "[TOR] Current Exit IP:"
          curl --socks5-hostname 127.0.0.1:9050 https://checkip.amazonaws.com

      - name: Create Environment File
        run: |
          echo "DECRYPT_KEY=${{ secrets.DECRYPT_KEY }}" > .env

      - name: Execute Automation Script
        run: |
          python india.py