name: Generate Content

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-automation:
    runs-on: windows-latest # 👈 Ubuntu se Windows kar diya

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # 🟢 WINDOWS COMPATIBLE VPN STEP (PowerShell Core)
    - name: Install and Connect OpenVPN (Windows)
      env:
        VPN_USER: ${{ secrets.VPN_USERNAME }}
        VPN_PASS: ${{ secrets.VPN_PASSWORD }}
      shell: pwsh # 👈 Explicitly PowerShell use karne ke liye
      run: |
        $ErrorActionPreference = "Continue"
        
        # 1. Windows par OpenVPN install karna (Chocolatey package manager se)
        Write-Host "[INFO] Installing OpenVPN via Chocolatey..."
        choco install openvpn -y --no-progress
        
        # OpenVPN path ko environment variables mein add karna
        $env:Path += ";C:\Program Files\OpenVPN\bin"
        
        # 2. 🎲 RANDOM FILE SELECTION MECHANISM (Windows Path Style)
        # 'ovpn' folder se saari txt files uthana
        $Files = Get-ChildItem -Path "ovpn\ovpn_*.txt"
        
        if ($Files.Count -eq 0) {
            Write-Error "[ERROR] No OVPN text files found in 'ovpn/' directory!"
            exit 1
        }
        
        $RandomIndex = Get-Random -Maximum $Files.Count
        $SelectedFile = $Files[$RandomIndex].FullName
        Write-Host "[INFO] Randomly selected VPN Config: $SelectedFile"
        
        # File ko client.ovpn mein copy karna
        Copy-Item -Path $SelectedFile -Destination "client.ovpn" -Force
        
        # Credentials file banana
        "$env:VPN_USER`n$env:VPN_PASS" | Out-File -FilePath "credentials.txt" -Encoding ascii -Force
        
        # 3. 💡 CLEANUP CONFIG TO PREVENT HANGS (Windows alternative to sed)
        (Get-Content client.ovpn) | 
            Where-Object { $_ -notmatch 'update-resolv-conf' } | 
            ForEach-Object { $_ -replace 'resolv-retry infinite', 'resolv-retry 2' } |
            ForEach-Object { $_ -replace 'auth-user-pass.*', 'auth-user-pass credentials.txt' } |
            Out-File client.ovpn -Encoding ascii -Force
            
        # 4. OpenVPN ko background mein start karna
        Write-Host "[INFO] Starting OpenVPN..."
        Start-Process -FilePath "C:\Program Files\OpenVPN\bin\openvpn.exe" -ArgumentList "--config client.ovpn --log openvpn.log" -WindowStyle Hidden
        
        # Tunnel active hone ke liye wait karna
        Write-Host "[WAIT] Waiting 20 seconds for VPN tunnel..."
        Start-Sleep -Seconds 20
        
        # Logs print karna
        Write-Host "--- OpenVPN Init Logs ---"
        if (Test-Path openvpn.log) { Get-Content openvpn.log -Tail 15 }
        
        # IP Check aur Fallback logic
        Write-Host "[INFO] Checking Public IP Status..."
        try {
            $ip = Invoke-RestMethod -Uri "https://ifconfig.me" -TimeoutSec 10
            Write-Host "[SUCCESS] VPN Connected Successfully! Current IP: $ip"
        }
        catch {
            Write-Warning "[WARNING] First choice failed. Trying fallback..."
            
            # 🔄 FALLBACK MECHANISM
            $NewIndex = ($RandomIndex + 1) % $Files.Count
            $SelectedFile = $Files[$NewIndex].FullName
            Write-Host "[INFO] Fallback selected VPN Config: $SelectedFile"
            
            # Purana process kill karna
            Stop-Process -Name openvpn -Force -ErrorAction SilentlyContinue
            
            Copy-Item -Path $SelectedFile -Destination "client.ovpn" -Force
            (Get-Content client.ovpn) | 
                Where-Object { $_ -notmatch 'update-resolv-conf' } | 
                ForEach-Object { $_ -replace 'resolv-retry infinite', 'resolv-retry 2' } |
                ForEach-Object { $_ -replace 'auth-user-pass.*', 'auth-user-pass credentials.txt' } |
                Out-File client.ovpn -Encoding ascii -Force
                
            Start-Process -FilePath "C:\Program Files\OpenVPN\bin\openvpn.exe" -ArgumentList "--config client.ovpn --log openvpn.log" -WindowStyle Hidden
            Start-Sleep -Seconds 20
            
            if (Test-Path openvpn.log) { Get-Content openvpn.log -Tail 15 }
            try {
                $ip = Invoke-RestMethod -Uri "https://ifconfig.me" -TimeoutSec 10
                Write-Host "[SUCCESS] Fallback connected! IP: $ip"
            }
            catch {
                Write-Host "Proceeding with current network route..."
            }
        }

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Pull Latest Changes (Maintain Persistence)
      run: |
        git pull origin $env:GITHUB_REF_NAME --rebase

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright playwright-stealth cryptography python-dotenv
        playwright install chromium # 👈 Windows par '--with-deps' ki zaroorat nahi hoti, yeh auto-manage karta hai

    - name: Run Script
      env:
        DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
      run: |
        python generate_content.py

    - name: Upload Error Screenshot
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playright-error-screenshot
        path: error_screenshot.png
        if-no-files-found: ignore

    - name: Commit and Push Changes (If updated)
      run: |
        git add article.json topics.txt
        
        # Windows PowerShell compatible diff check
        git diff --staged --quiet
        if ($LASTEXITCODE -eq 0) {
          Write-Host "[INFO] No changes detected. Skipping push."
        } else {
          Write-Host "[OK] Changes detected. Committing and pushing updates..."
          git commit -m "Automated: Update article and topics list [skip ci]"
          git push origin $env:GITHUB_REF_NAME
        }