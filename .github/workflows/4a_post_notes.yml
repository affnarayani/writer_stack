name: 4A. Post Notes

on:
  workflow_dispatch: # Taaki aap zaroorat padne par manually bhi run kar sakein
  schedule:
    - cron: '0 12,16,23 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  run-script:
    runs-on: ubuntu-latest # Linux container fast aur efficient chalta hai

    steps:
      # 1. Repository ka code checkout karna
      - name: Checkout repository code
        uses: actions/checkout@v5

      # 2. Python Environment setup karna
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull Latest Changes (Maintain Persistence)
        run: |
          git pull origin ${GITHUB_REF_NAME} --rebase

      - name: Install and Start Cloudflare WARP (TUN Global Mode)
        run: |
          # 1. Repository aur GPG Key set karein
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          
          # 2. Install
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          
          # 3. Start Service
          sudo systemctl start warp-svc
          sleep 2
          
          # 4. Register (New CLI Syntax compatible)
          warp-cli --accept-tos registration new || warp-cli registration new
          
          # 5. STRICT FIX: Mode ko PROXY se badal kar TUN (Standard VPN) karein
          # Yeh pure GitHub runner ka internet traffic WARP se routing kar dega
          warp-cli --accept-tos mode warp || warp-cli mode warp
          
          # 6. Connect
          warp-cli --accept-tos connect || warp-cli connect
          sleep 5
          
          # 7. Verify ki pure system ka IP change hua ya nahi
          curl https://cloudflare.com/cdn-cgi/trace

      # 4. Python Packages/Dependencies install karna
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright-stealth python-dotenv cryptography requests
          pip install --upgrade playwright

      # 5. Playwright ke Chromium browser aur uski system dependencies install karna
      - name: Install Playwright Chromium and system dependencies
        run: |
          python -m playwright install chromium --with-deps

      # 6. Script ko run karna aur Environment Secret paas karna
      - name: Execute Automation Script
        env:
          DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
          IMGBBB_API_KEY: ${{ secrets.IMGBBB_API_KEY }}
        run: |
          python post_notes.py

      # 7. Agar script fail hoti hai, toh error screenshot ko upload karna
      - name: Upload Error Screenshot if script fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: substack-notes-error-screenshot
          path: error_screenshot.png
          retention-days: 7

      # 8. Agar script successful ho, to use wapas GitHub par commit karna
      - name: Commit and Push updated files
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # notes.json (jahan state _posted: true hoti hai) aur article.json (agar saare notes khatam hone par key clear hoti hai)
          git add notes.json article.json
          
          if git diff --staged --quiet; then
            echo "[INFO] No tracking changes detected. Skipping commit."
          else
            echo "[OK] Staged changes found. Committing and pushing updates..."
            git commit -m "chore: update notes posting queue state [skip ci]"
            git pull origin ${GITHUB_REF_NAME} --rebase
            git push origin ${GITHUB_REF_NAME}
          fi