name: Generate Image

on:
  workflow_dispatch: # Taaki manual button bhi rahe
  workflow_run:
    workflows: ["Generate Content"]
    types:
      - completed


jobs:
  run-image-automation:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 # Full history fetch karega taaki safe dynamic push ho sake

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # 🟢 VPN BLOCK START (SAME TO SAME ORIGINAL LOGIC)
    - name: Install and Connect OpenVPN (Randomized Config Loader)
      env:
        VPN_USER: ${{ secrets.VPN_USERNAME }}
        VPN_PASS: ${{ secrets.VPN_PASSWORD }}
      run: |
        set +e
        export DEBIAN_FRONTEND=noninteractive
        
        # Ubuntu ke triggers block karna taaki apt installation fast ho
        sudo dpkg-divert --local --rename --add /usr/sbin/policy-rc.d
        echo "exit 101" | sudo tee /usr/sbin/policy-rc.d
        sudo chmod +x /usr/sbin/policy-rc.d
        
        sudo apt-get remove --purge -y needrestart
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends openvpn
        
        sudo rm -f /usr/sbin/policy-rc.d || true
        
        # 🎲 RANDOM FILE SELECTION MECHANISM
        FILES=(ovpn/ovpn_*.txt)
        
        if [ ${#FILES[@]} -eq 0 ]; then
          echo "[ERROR] No OVPN text files found in 'ovpn/' directory!"
          exit 1
        fi
        
        RANDOM_INDEX=$(( RANDOM % ${#FILES[@]} ))
        SELECTED_FILE=${FILES[$RANDOM_INDEX]}
        echo "[INFO] Randomly selected VPN Config: $SELECTED_FILE"
        
        cat "$SELECTED_FILE" > client.ovpn
        echo -e "$VPN_USER\n$VPN_PASS" > credentials.txt
        chmod 600 credentials.txt
        
        # 💡 CLEANUP CONFIG TO PREVENT HANGS
        sed -i '/update-resolv-conf/d' client.ovpn
        sed -i 's/resolv-retry infinite/resolv-retry 2/g' client.ovpn
        sed -i 's/auth-user-pass.*/auth-user-pass credentials.txt/g' client.ovpn
        
        echo "[INFO] Starting OpenVPN in background daemon mode..."
        sudo openvpn --config client.ovpn --log openvpn.log --daemon
        
        set -e
        echo "[WAIT] Waiting 20 seconds for VPN tunnel..."
        sleep 20
        
        echo "--- OpenVPN Init Logs ---"
        sudo tail -n 15 openvpn.log || true
        
        echo "[INFO] Checking Public IP Status..."
        if curl -s --max-time 10 https://ifconfig.me; then
          echo -e "\n[SUCCESS] VPN Connected Successfully!"
        else
          echo -e "\n[WARNING] First choice failed. Trying fallback..."
          NEW_INDEX=$(( (RANDOM_INDEX + 1) % ${#FILES[@]} ))
          SELECTED_FILE=${FILES[$NEW_INDEX]}
          echo "[INFO] Fallback selected VPN Config: $SELECTED_FILE"
          
          sudo killall openvpn || true
          cat "$SELECTED_FILE" > client.ovpn
          sed -i '/update-resolv-conf/d' client.ovpn
          sed -i 's/resolv-retry infinite/resolv-retry 2/g' client.ovpn
          sed -i 's/auth-user-pass.*/auth-user-pass credentials.txt/g' client.ovpn
          
          sudo openvpn --config client.ovpn --log openvpn.log --daemon
          sleep 20
          sudo tail -n 15 openvpn.log || true
          curl -s --max-time 10 https://ifconfig.me || echo "Proceeding with current network route..."
        fi

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Pull Latest Changes (Maintain Persistence)
      run: |
        git pull origin ${GITHUB_REF_NAME} --rebase

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright playwright-stealth cryptography python-dotenv huggingface_hub requests
        playwright install chromium --with-deps

    - name: Run Image Script
      env:
        DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }} # GitHub Repository Secrets se key uthayega
        HF_TOKEN: ${{ secrets.HF_TOKEN }}       # GitHub Repository Secrets se Hugging Face token uthayega
      run: |
        python generate_image.py

    - name: Upload Error Screenshot
      if: failure() # Yeh step sirf tabhi chalega jab upar wala step fail hoga
      uses: actions/upload-artifact@v4
      with:
        name: playright-error-screenshot
        path: error_screenshot.png
        if-no-files-found: ignore

    - name: Commit and Push Generated Image (If downloaded)
      run: |
        # Check karega ki image/pin.png create ya update hui hai ya nahi
        git add image/pin.png
        
        if git diff --staged --quiet; then
          echo "[INFO] No image changes detected. Skipping push."
        else
          echo "[OK] New image detected. Committing and pushing updates..."
          git commit -m "Automated: Update generated header image [skip ci]"
          git push origin ${GITHUB_REF_NAME}
        fi