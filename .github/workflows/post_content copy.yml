name: Generate Content and Post Medium

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write # Allows the runner to commit updated tracking files and manage image folders

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository with a fallback token mechanism
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      # 2. Setup the Python environment utilizing pip caching mechanisms
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install core Python packages from the project's tracking file
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Install Playwright browser binaries along with system operating level dependencies
      - name: Install Playwright and System Dependencies
        run: |
          python -m playwright install --with-deps chromium

      # 5. Step 1: Wipe the dynamic image target workspace directory clean
      - name: Run Clear Image Folder Script
        run: |
          python clear_image_folder.py

      # 6. Step 2: Fetch and format topic layout metadata into a structured article payload JSON file
      - name: Run Generate Content Script
        env:
          DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
        run: |
          python generate_content.py

      # 7. Step 3: Parse content files, request AI prompt optimization and natively download premium hero image assets
      - name: Run Generate Image Script
        env:
          DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python generate_image.py

      # 8. Step 4: Dispatch interactions to type copy, upload visual media, frame CTAs and launch live to Medium
      # Wrapped inside xvfb-run to seamlessly support the required HEADLESS = False parameter on cloud runners
      - name: Run Post Medium Script
        env:
          DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
        run: |
          xvfb-run --auto-servernum python post_medium.py

      # 9. Commit and Push back any core operational tracking state changes (topics.txt adjustments)
      # This step only runs if all preceding python steps completed with zero errors
      - name: Commit and Push Any Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p image
          touch image/.gitkeep
          
          # Pull the latest remote origin mutations to strictly prevent tracking collisions
          git pull origin main
          
          # Add all tracked alterations, untracked components, and deleted files (-A flag ensures sync)
          git add -A
          
          # Evaluate staged files to safely guard against empty commit interruptions
          if git diff --staged --quiet; then
            echo "No operational data changes or topic updates found to commit."
          else
            git commit -m "chore: automated content generation, media downloads, and medium publishing cycle [skip ci]"
            git push origin main
          fi