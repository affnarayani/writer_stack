name: 1C. Like and Comment

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["1B. Generate Comment"] # Jab 'Generate Comment' workflow khatam hoga tab trigger hoga
    types:
      - completed

permissions:
  contents: write # Grants permission to modify and push json state changes back to the repository

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-automation:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. Fetch the latest code and state from the repository
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0 

      # 2. Configure Python Environment
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # 3. Configure Git Identity Early (To avoid rebase identity conflicts)
      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 4. Pull Latest Changes before setting up infrastructure
      - name: Pull Latest Changes
        run: |
          git pull origin ${GITHUB_REF_NAME:-main} --rebase

      - name: Install and Start Cloudflare WARP (TUN Global Mode)
        run: |
          # 1. Repository aur GPG Key set karein
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          
          # 2. Install
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          
          # 3. Start Service
          sudo systemctl start warp-svc
          sleep 2
          
          # 4. Register (New CLI Syntax compatible)
          warp-cli --accept-tos registration new || warp-cli registration new
          
          # 5. STRICT FIX: Mode ko PROXY se badal kar TUN (Standard VPN) karein
          # Yeh pure GitHub runner ka internet traffic WARP se routing kar dega
          warp-cli --accept-tos mode warp || warp-cli mode warp
          
          # 6. Connect
          warp-cli --accept-tos connect || warp-cli connect
          sleep 5
          
          # 7. Verify ki pure system ka IP change hua ya nahi
          curl https://cloudflare.com/cdn-cgi/trace

      # 5. Install required packages from requirements.txt or raw fallbacks
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install playwright playwright-stealth cryptography python-dotenv; fi

      # 6. Set up Playwright Chromium browser and its system binaries
      - name: Install Playwright and System Dependencies
        run: |
          python -m playwright install --with-deps chromium

      # 7. Run the core automation script (Clean Headless Execution)
      - name: Run Substack Like and Comment Script
        env:
          DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
        run: |
          python like_comment.py

      # 8. Archive Error Screenshot if script crashes
      - name: Upload Error Screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: substack-final-error-screenshot
          path: error_screenshot.png
          if-no-files-found: ignore
          retention-days: 3

      # 9. Commit and Push Any Changes (Safe State Sync with Stash)
      - name: Commit and Push Any Changes
        if: always() # Hamesha chalega taaki state save ho sake
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME:-main}"
          
          # Local changes temporarily hide karo
          git stash
          
          # Remote changes securely pull karo
          git pull origin "$BRANCH_NAME" --rebase
          
          # Local changes wapas apply karo
          git stash pop || true
          
          [ -f status.json ] && git add status.json
          [ -f commented.json ] && git add commented.json
          
          if git diff --staged --quiet; then
            echo "No new changes to commit."
          else
            git commit -m "chore: update automation history state [skip ci]"
            git pull origin ${GITHUB_REF_NAME} --rebase
            git push origin "$BRANCH_NAME"
          fi

      # 10. Clean up raw credentials from runner before termination
      - name: Cleanup VPN Credentials
        if: always()
        run: |
          rm -f credentials.txt client.ovpn openvpn.log || true