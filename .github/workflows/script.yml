name: Run Substack Auto Publisher

on:
  workflow_dispatch: # Isse aap manually bhi GitHub panel se run kar sakte hain
  schedule:
    - cron: '30 20 * * *' # Raat ke 2:00 baje (IST) automatic run karne ke liye cron schedule

jobs:
  run-script:
    runs-on: ubuntu-latest # Linux container fast aur efficient chalta hai

    steps:
      # 1. Repository ka code checkout karna
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. Python Environment setup karna
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 🟢 PERMANENTLY FIXED VPN STEP (Bypassing Ubuntu needrestart strict rule)
      - name: Install and Connect OpenVPN (Direct Linux Command)
        env:
          OVPN_DATA: ${{ secrets.OPVN_CONFIG_DATA }}
        run: |
          # 1. Non-interactive frontend force karna
          export DEBIAN_FRONTEND=noninteractive
          
          # 2. 🔥 NEEDRESTART KO PURE RUN KE LIYE AUTOMATIC/SILENT MODE PAR SET KARNA
          # Yeh line Ubuntu ko bolegi ki agar koi service restart ka menu aaye toh chupchaap bina prompt ke use ignore/auto-handle kare
          sudo sed -i "s/#\$nrconf{restart} = 'i';/\$nrconf{restart} = 'a';/g" /etc/needrestart/needrestart.conf || true
          
          # 3. OpenVPN aur systemd-resolved install karna safely
          sudo apt-get update -y
          sudo apt-get install -y \
            -o Dpkg::Options::="--force-confdef" \
            -o Dpkg::Options::="--force-confold" \
            openvpn openvpn-systemd-resolved
          
          # 4. Secret se .ovpn data lekar file banana
          echo "$OVPN_DATA" > client.ovpn
          
          # 5. OpenVPN ko core privileges ke sath background daemon state mein call karna
          sudo openvpn --config client.ovpn --log openvpn.log --daemon
          
          # 6. VPN tunnel (tun0) active hone ke liye 20 seconds ka wait karna
          echo "[WAIT] Waiting for VPN connection to establish..."
          sleep 20
          
          # 7. Verify karna ki public IP badla ya nahi
          echo "[INFO] Current Public IP is:"
          curl -s --max-time 10 https://ifconfig.me || echo "Could not fetch IP, routing active. Checking status..."
          
          # Logs display in case debug stream is needed
          echo "--- OpenVPN Init Logs ---"
          sudo tail -n 20 openvpn.log || true

      # 4. Playwright Persistent User Data ko cache se restore karna
      - name: Restore Playwright Persistent Context Cache
        uses: actions/cache@v4
        with:
          path: stack_user_data
          key: ${{ runner.os }}-playwright-session-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-playwright-session-

      # 5. Python Packages/Dependencies install karna
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth python-dotenv cryptography

      # 6. Playwright ke Chromium browser aur uski system dependencies install karna
      - name: Install Playwright Chromium and system dependencies
        run: |
          playwright install chromium --with-deps

      # 7. Script ko run karna aur Environment Secret paas karna
      - name: Execute Automation Script
        env:
          DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }} # GitHub Secrets se decryption key uthayega
        run: |
          python post_article.py

      # 8. Agar script fail hoti hai, toh error screenshot ko upload karna
      - name: Upload Error Screenshot if script fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: substack-error-screenshot
          path: error_screenshot.png
          retention-days: 7

      # 9. Agar script successful ho, to use wapas GitHub par commit karna
      - name: Commit and Push updated article.json
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add article.json
          git diff-index --quiet HEAD || git commit -m "chore: mark article as posted [skip ci]"
          git push