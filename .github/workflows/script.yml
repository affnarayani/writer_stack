name: Run Substack Auto Publisher

on:
  workflow_dispatch: # Isse aap manually bhi GitHub panel se run kar sakte hain

jobs:
  run-script:
    runs-on: windows-latest # Yahan Ubuntu ki jagah Windows set kar diya hai

    steps:
      # 1. Repository ka code checkout karna
      - name: Checkout repository code
        uses: actions/checkout@v5

      # 2. Python Environment setup karna
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      # 2.5 Playwright Persistent User Data ko cache se restore karna (Windows Specific)
      - name: Restore Playwright Persistent Context Cache
        uses: actions/cache@v4
        with:
          path: stack_user_data
          key: ${{ runner.os }}-playwright-session-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-playwright-session-

      # 3. Python Packages/Dependencies install karna
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth python-dotenv cryptography

      # 4. Playwright ke Chromium browser ko install karna
      - name: Install Playwright Chromium
        run: |
          playwright install chromium

      # 5. Script ko run karna aur Environment Secret paas karna
      - name: Execute Automation Script
        env:
          DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
        run: |
          python post_article.py

      # 6. Agar script article.json ko update karta hai, to use wapas GitHub par commit karna
      - name: Commit and Push updated article.json
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add article.json
          git diff-index --quiet HEAD || git commit -m "chore: mark article as posted [skip ci]"
          git push