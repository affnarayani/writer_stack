name: Run Substack Auto Publisher

on:
  push:
    branches:
      - main # Jab bhi aap main branch par 'git push' karenge, yeh automatic chalega
  workflow_dispatch: # Taaki aap zaroorat padne par manually bhi run kar sakein
  schedule:
    - cron: '30 20 * * *' # Raat ke 2:00 baje (IST) automatic run karne ke liye cron schedule

jobs:
  run-script:
    runs-on: ubuntu-latest # Linux container fast aur efficient chalta hai

    steps:
      # 1. Repository ka code checkout karna
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. Python Environment setup karna
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 🟢 FULLY OPTIMIZED NON-BLOCKING VPN STEP
      - name: Install and Connect OpenVPN
        env:
          OVPN_DATA: ${{ secrets.OPVN_CONFIG_DATA }}
          VPN_USER: ${{ secrets.VPN_USERNAME }}
          VPN_PASS: ${{ secrets.VPN_PASSWORD }}
        run: |
          set +e
          export DEBIAN_FRONTEND=noninteractive
          
          # Ubuntu ke triggers block karna taaki apt installation fast ho
          sudo dpkg-divert --local --rename --add /usr/sbin/policy-rc.d
          echo "exit 101" | sudo tee /usr/sbin/policy-rc.d
          sudo chmod +x /usr/sbin/policy-rc.d
          
          sudo apt-get remove --purge -y needrestart
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends openvpn
          
          sudo rm -f /usr/sbin/policy-rc.d || true
          
          # Config aur Credentials files banana
          echo "$OVPN_DATA" > client.ovpn
          echo -e "$VPN_USER\n$VPN_PASS" > credentials.txt
          chmod 600 credentials.txt
          
          # 💡 CLEANUP CONFIG TO PREVENT HANGS:
          # Hang hone wale automatic DNS scripts aur infinite retry ko file se remove karna
          sed -i '/update-resolv-conf/d' client.ovpn
          sed -i 's/resolv-retry infinite/resolv-retry 2/g' client.ovpn
          
          # Credentials link karna
          sed -i 's/auth-user-pass.*/auth-user-pass credentials.txt/g' client.ovpn
          
          echo "[INFO] Starting OpenVPN in background daemon mode..."
          # `--daemon` flag ke sath run karna taaki yeh background mein chala jaye aur terminal block na ho
          sudo openvpn --config client.ovpn --log openvpn.log --daemon
          
          set -e
          
          # VPN tunnel (tun0) active hone ke liye 20 seconds ka wait karenge
          echo "[WAIT] Waiting 20 seconds for VPN tunnel..."
          sleep 20
          
          # Logs check karna ki connect hua ya error aaya
          echo "--- OpenVPN Init Logs ---"
          sudo tail -n 15 openvpn.log || true
          
          # Verify karna ki public IP badla ya nahi (Max time 10s taaki hang na ho)
          echo "[INFO] Checking Public IP Status..."
          curl -s --max-time 10 https://ifconfig.me || echo "Could not fetch IP, proceeding with routing..."

      # 4. Playwright Persistent User Data ko cache se restore karna
      - name: Restore Playwright Persistent Context Cache
        uses: actions/cache@v4
        with:
          path: stack_user_data
          key: ${{ runner.os }}-playwright-session-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-playwright-session-

      # 5. Python Packages/Dependencies install karna
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth python-dotenv cryptography

      # 6. Playwright ke Chromium browser aur uski system dependencies install karna
      - name: Install Playwright Chromium and system dependencies
        run: |
          playwright install chromium --with-deps

      # 7. Script ko run karna aur Environment Secret paas karna
      - name: Execute Automation Script
        env:
          DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
        run: |
          python post_article.py

      # 8. Agar script fail hoti hai, toh error screenshot ko upload karna
      - name: Upload Error Screenshot if script fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: substack-error-screenshot
          path: error_screenshot.png
          retention-days: 7

      # 9. Agar script successful ho, to use wapas GitHub par commit karna
      - name: Commit and Push updated article.json
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add article.json
          git diff-index --quiet HEAD || git commit -m "chore: mark article as posted [skip ci]"
          git push