name: Run Substack Auto Publisher

on:
  workflow_dispatch: # Isse aap manually bhi GitHub panel se run kar sakte hain

jobs:
  run-script:
    runs-on: ubuntu-latest # Windows/Mac ke mukable sabse fast aur free-minutes-friendly

    steps:
      # 1. Repository ka code checkout karna
      - name: Checkout repository code
        uses: actions/checkout@v5

      # 2. Python Environment setup karna
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip' # Next runs ko fast banane ke liye pip dependencies cache karega

      # 3. Playwright Persistent User Data ko cache se restore karna
      - name: Restore Playwright Persistent Context Cache
        uses: actions/cache@v4
        with:
          path: stack_user_data
          # Unique run ID se naya key banega, par pichle session se data uthane ke liye restore-keys ka use hoga
          key: ${{ runner.os }}-playwright-session-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-playwright-session-

      # 4. Python Packages/Dependencies install karna
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth python-dotenv cryptography

      # 5. Playwright ke Chromium browser aur uski system dependencies install karna (Ubuntu Specific)
      - name: Install Playwright Chromium and system dependencies
        run: |
          playwright install chromium --with-deps

      # 6. Script ko run karna aur Environment Secret paas karna
      - name: Execute Automation Script
        env:
          DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }} # GitHub Secrets se key uthayega
        run: |
          python post_article.py

      # 7. Agar script fail hoti hai, toh error screenshot ko upload karna
      - name: Upload Error Screenshot if script fails
        if: failure() # Yeh step sirf tabhi chalega jab upar wala step fail ho jaye
        uses: actions/upload-artifact@v4
        with:
          name: substack-error-screenshot
          path: error_screenshot.png
          retention-days: 7 # 7 din baad yeh screenshot automatic delete ho jayega

      # 8. Agar script article.json ko 'posted: true' mark karta hai, to use wapas GitHub par commit karna
      - name: Commit and Push updated article.json
        if: success() # Sirf tabhi chalega agar script successfully bina kisi error ke complete ho
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add article.json
          # Check karega ki kuch badla hai ya nahi, tabhi commit aur push karega
          git diff-index --quiet HEAD || git commit -m "chore: mark article as posted [skip ci]"
          git push