name: 2C. Post Article

on:
  workflow_dispatch: # Taaki aap zaroorat padne par manually bhi run kar sakein
  workflow_run:
    workflows: ["2B. Generate Image"] # Jab 'Generate Image' workflow khatam hoga tab trigger hoga
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  run-script:
    runs-on: ubuntu-latest # Linux container fast aur efficient chalta hai
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. Repository ka code checkout karna (Yeh step aapki text files ko runner mein laayega)
      - name: Checkout repository code
        uses: actions/checkout@v5

      # 2. Python Environment setup karna
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull Latest Changes (Maintain Persistence)
        run: |
          git pull origin ${GITHUB_REF_NAME} --rebase

      - name: Install and Start Cloudflare WARP Official Client
        run: |
          # 1. Cloudflare ka official gpg key aur repository add karein
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          
          # 2. WARP client install karein
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          
          # 3. WARP service ko background mein start karein
          sudo systemctl start warp-svc
          sleep 3
          
          # 4. Environment Variable ke sath Terms of Service accept aur register karein
          export WARP_ACCEPT_TOS=1
          
          # Naye CLI mein global flag commands se PEHLE lagaya jata hai, is tarah:
          warp-cli --accept-tos registration new || warp-cli registration new
          
          # 5. Client ko proxy mode par set karke connect karein
          warp-cli --accept-tos mode proxy || warp-cli mode proxy
          warp-cli --accept-tos connect || warp-cli connect
          
          # 6. Proxy status verification
          sleep 5
          warp-cli --accept-tos status || warp-cli status
          echo "[OK] Cloudflare WARP is running on local proxy port 40000"

      # 4. Python Packages/Dependencies install karna
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth python-dotenv cryptography

      # 5. Playwright ke Chromium browser aur uski system dependencies install karna
      - name: Install Playwright Chromium and system dependencies
        run: |
          playwright install chromium --with-deps

      # 6. Script ko run karna aur Environment Secret paas karna
      - name: Execute Automation Script
        env:
          DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
          HTTP_PROXY: http://127.0.0.1:40000
          HTTPS_PROXY: http://127.0.0.1:40000
        run: |
          python post_article.py

      # 7. Agar script fail hoti hai, toh error screenshot ko upload karna
      - name: Upload Error Screenshot if script fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: substack-error-screenshot
          path: error_screenshot.png
          retention-days: 7

      # 8. Agar script successful ho, to use wapas GitHub par commit karna
      - name: Commit and Push updated article.json
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add article.json
          git diff-index --quiet HEAD || git commit -m "chore: mark article as posted [skip ci]"
          
          # Pull the absolute latest changes right before pushing to catch race conditions
          git pull origin ${GITHUB_REF_NAME} --rebase 
          git push origin ${GITHUB_REF_NAME}